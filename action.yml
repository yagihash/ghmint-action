name: Request mini-gh-sts token
description: Obtain a GitHub App Installation Access Token from mini-gh-sts using a GitHub Actions OIDC token

inputs:
  hostname:
    description: Hostname of mini-gh-sts
    required: false
    default: sts.yagihash.dev
  scope:
    description: Token scope in <org> or <org>/<repo> format
    required: true
  policy:
    description: Policy name to use
    required: true

outputs:
  token:
    description: GitHub App Installation Access Token obtained from mini-gh-sts

runs:
  using: node24
  main: index.js
  post: post.js
