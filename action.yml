name: Request mini-gh-sts token
description: GitHub Actions OIDC token を使って mini-gh-sts から GitHub App Installation Access Token を取得する

inputs:
  hostname:
    description: mini-gh-sts のホスト名
    required: false
    default: sts.yagihash.dev
  scope:
    description: トークンのスコープ（<org> または <org>/<repo> 形式）
    required: true
  policy:
    description: 使用するポリシー名
    required: true

outputs:
  token:
    description: 取得した GitHub App Installation Access Token

runs:
  using: node24
  main: index.js
  post: post.js
